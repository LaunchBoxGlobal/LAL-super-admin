<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Get LookALike Match</title>
    <meta
      name="description"
      content="Find your celebrity lookalike in seconds. Download LookALike Match for iOS and Android."
    />

    <!-- Open Graph so the link previews correctly when pasted anywhere -->
    <meta property="og:title" content="LookALike Match" />
    <meta
      property="og:description"
      content="Find your celebrity lookalike in seconds."
    />
    <meta
      property="og:image"
      content="https://launchboxglobal.com/lal/og.jpg"
    />
    <meta property="og:type" content="website" />

    <!-- Apple Smart App Banner: shows a native install strip in Safari -->
    <meta name="apple-itunes-app" content="app-id=6766226894" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="card">
      <div class="blue-glow"></div>
      <div class="purple-glow"></div>
      <img class="logo" src="/images/lookalikematch-logo.svg" alt="" />
      <h1>Find your celebrity lookalike</h1>
      <p class="sub" id="sub">Opening the store…</p>

      <div id="choices" class="hidden" style="width: 100%; max-width: 340px">
        <a
          class="btn primary"
          id="ios"
          href="#"
          style="text-align: center; width: 100%; max-width: 340px"
        >
          <img src="/images/apple-icon.png" alt="apple-icon" class="btn-icon" />
          Download on the App Store</a
        >
        <a class="btn" id="android" href="#" style="text-align: center">
          <img
            src="/images/pngfind.com-google-play-logo-png-1807950.png"
            alt="play store"
            class="btn-icon"
          />
          Get it on Google Play
        </a>
      </div>

      <p class="note" id="note"></p>
    </main>

    <script>
      (function () {
        // Store destinations. No /us/ on the Apple link so it auto-routes to the
        // visitor's local storefront (PK, IN, ID, PH, BR).
        var IOS = "https://apps.apple.com/app/id6766226894";
        var ANDROID =
          "https://play.google.com/store/apps/details?id=com.launchbox.lal";

        var ua = navigator.userAgent || "";
        var isAndroid = /android/i.test(ua);
        var isIOS =
          /iPad|iPhone|iPod/.test(ua) ||
          (/Mac/.test(ua) && navigator.maxTouchPoints > 1); // iPadOS desktop mode

        // Forward campaign params so store analytics can attribute the visit.
        var incoming = new URLSearchParams(location.search);

        function build(base) {
          var url = new URL(base);
          if (base === ANDROID) {
            // Play Store reads a single "referrer" string.
            var ref = incoming.toString();
            if (ref) url.searchParams.set("referrer", ref);
          } else {
            // Apple reads pt / ct / mt for campaign tracking.
            var ct = incoming.get("utm_campaign") || incoming.get("ct");
            if (ct) url.searchParams.set("ct", ct);
            url.searchParams.set("mt", "8");
          }
          return url.toString();
        }

        var iosUrl = build(IOS);
        var androidUrl = build(ANDROID);

        document.getElementById("ios").href = iosUrl;
        document.getElementById("android").href = androidUrl;

        if (isAndroid) {
          location.replace(androidUrl);
        } else if (isIOS) {
          location.replace(iosUrl);
        } else {
          // Desktop, or anything we cannot identify: let the visitor choose.
          document.getElementById("sub").textContent =
            "Available free on iOS and Android.";
          document.getElementById("choices").classList.remove("hidden");
          document.getElementById("note").textContent =
            "Open this page on your phone to install directly.";
        }
      })();
    </script>
  </body>
</html>
